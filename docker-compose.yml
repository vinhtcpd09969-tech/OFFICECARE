version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: physioflow_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - physioflow_pgdata:/var/lib/postgresql/data

volumes:
  physioflow_pgdata:
